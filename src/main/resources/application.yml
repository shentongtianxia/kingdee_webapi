server:
  port: 8091
  servlet:
    context-path: /

spring:
  application:
    name: kingdee-webapi

  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
      fail-on-empty-beans: false
    deserialization:
      fail-on-unknown-properties: false

  # Spring Boot 2.6+ 需要配置路径匹配策略，否则Swagger无法正常扫描
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

# Knife4j 增强配置
knife4j:
  enable: true
  setting:
    language: zh_CN

# 日志配置
logging:
  level:
    com.kingdee.webapi: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/kingdee-webapi.log

# 管理端点配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always 